    <div class="flex flex-col" style="min-height: calc(100vh - 56px); padding-bottom: 80px;">
        <!-- Game stats bar - fixed 2-row grid, no scroll -->
        <div class="px-2 py-1.5 grid grid-cols-3 gap-1.5" id="game-info-bar">
            <div class="rounded-xl px-2 py-1.5 stat-pill" style="background: linear-gradient(135deg, rgba(255,140,0,0.15), rgba(255,140,0,0.05)); border: 1px solid rgba(255,140,0,0.3);">
                <div class="stat-label" style="color: rgba(255,140,0,0.6);">GAME</div>
                <div id="game-id-display" class="stat-value" style="color: #FF8C00; font-size: 10px; font-weight: 900;">#---</div>
            </div>
            <div class="rounded-xl px-2 py-1.5 stat-pill" style="background: linear-gradient(135deg, rgba(16,185,129,0.15), rgba(16,185,129,0.05)); border: 1px solid rgba(16,185,129,0.3);">
                <div class="stat-label" style="color: rgba(16,185,129,0.6);">PLAYERS</div>
                <div id="game-players" class="stat-value" style="color: #10B981; font-size: 10px; font-weight: 900;">1</div>
            </div>
            <div class="rounded-xl px-2 py-1.5 stat-pill" style="background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(59,130,246,0.05)); border: 1px solid rgba(59,130,246,0.3);">
                <div class="stat-label" style="color: rgba(59,130,246,0.6);">BET</div>
                <div id="game-stake" class="stat-value" style="color: #3B82F6; font-size: 10px; font-weight: 900;">0</div>
            </div>
            <div class="rounded-xl px-2 py-1.5 stat-pill" style="background: linear-gradient(135deg, rgba(168,85,247,0.15), rgba(168,85,247,0.05)); border: 1px solid rgba(168,85,247,0.3);">
                <div class="stat-label" style="color: rgba(168,85,247,0.6);">DERASH</div>
                <div id="game-derash" class="stat-value" style="color: #A855F7; font-size: 10px; font-weight: 900;">0</div>
            </div>
            <div class="rounded-xl px-2 py-1.5 stat-pill" style="background: linear-gradient(135deg, rgba(20,184,166,0.15), rgba(20,184,166,0.05)); border: 1px solid rgba(20,184,166,0.3);">
                <div class="stat-label" style="color: rgba(20,184,166,0.6);">CALLED</div>
                <div id="game-called-count" class="stat-value" style="color: #14B8A6; font-size: 10px; font-weight: 900;">0</div>
            </div>
            <div class="rounded-xl px-2 py-1.5 stat-pill" style="background: linear-gradient(135deg, rgba(239,68,68,0.15), rgba(239,68,68,0.05)); border: 1px solid rgba(239,68,68,0.3);">
                <div class="stat-label" style="color: rgba(239,68,68,0.6);">TIMER</div>
                <div id="game-timer" class="stat-value" style="color: #EF4444; font-size: 10px; font-weight: 900;">--</div>
            </div>
        </div>

        <!-- Countdown banner -->
        <div class="px-2 py-0.5">
            <div id="game-countdown" class="hidden text-center rounded-xl px-4 py-2 mb-1 font-bold text-xs" style="background: linear-gradient(135deg, rgba(168,85,247,0.25), rgba(59,130,246,0.25)); border: 1px solid rgba(168,85,247,0.35); color: #c4b5fd; backdrop-filter: blur(8px);">Game starting soon...</div>
        </div>

        <!-- Main game area: ALWAYS side-by-side -->
        <div class="px-2 py-1 flex flex-row gap-2 pb-6 flex-1" id="game-board-container" style="min-height: max-content;">
            <!-- LEFT: Master Grid (no scroll, full fit) -->
            <div class="w-[45%] rounded-2xl p-2 flex flex-col order-1" style="background: rgba(26,26,46,0.7); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.06);">
                <div class="grid grid-cols-5 gap-0.5 mb-1.5" id="master-grid-headers">
                    <div class="text-center text-[10px] font-black py-1 rounded-lg text-white" style="background: linear-gradient(135deg, #3B82F6, #2563EB);">B</div>
                    <div class="text-center text-[10px] font-black py-1 rounded-lg text-white" style="background: linear-gradient(135deg, #8B5CF6, #7C3AED);">I</div>
                    <div class="text-center text-[10px] font-black py-1 rounded-lg text-white" style="background: linear-gradient(135deg, #D946EF, #C026D3);">N</div>
                    <div class="text-center text-[10px] font-black py-1 rounded-lg text-white" style="background: linear-gradient(135deg, #10B981, #059669);">G</div>
                    <div class="text-center text-[10px] font-black py-1 rounded-lg text-white" style="background: linear-gradient(135deg, #F97316, #EA580C);">O</div>
                </div>
                <div class="grid grid-cols-5 gap-px flex-1" id="master-grid" style="overflow: hidden;"></div>
            </div>

            <!-- RIGHT: Stacked layout -->
            <div class="w-[55%] rounded-2xl p-2 flex flex-col order-2" style="background: rgba(26,26,46,0.7); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.06);">

                <!-- Row 1: Number Circle (centered) + Voice/Music beside it -->
                <div class="flex items-center justify-center gap-2 py-1">
                    <!-- Voice toggle -->
                    <button id="btn-voice" onclick="toggleVoice()" class="audio-btn flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center transition-all duration-300" style="background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);">
                        <svg id="voice-on" class="w-4 h-4 audio-icon-on" fill="currentColor" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                        <svg id="voice-off" class="w-4 h-4 audio-icon-off hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                    </button>
                    <!-- Number announcement circle -->
                    <div id="number-announce" class="hidden">
                        <div class="number-circle-outer rounded-full flex items-center justify-center" style="padding: 3px;">
                            <div class="w-full h-full rounded-full flex items-center justify-center" style="background: radial-gradient(circle, #1A1A2E 60%, #0D1117 100%);">
                                <div class="text-center leading-none">
                                    <div id="announce-letter" class="text-[11px] font-black tracking-wider"></div>
                                    <div id="announce-number" class="text-lg font-black text-white" style="text-shadow: 0 0 10px rgba(255,215,0,0.5);"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- Music toggle -->
                    <button id="btn-music" onclick="toggleMusic()" class="audio-btn flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center transition-all duration-300" style="background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);">
                        <svg id="music-on" class="w-4 h-4 audio-icon-on" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                        <svg id="music-off" class="w-4 h-4 audio-icon-off hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                    </button>
                </div>

                <!-- Separator -->
                <div class="section-separator"></div>

                <!-- Row 2: Called Numbers Strip (scrollable) -->
                <div class="flex items-center gap-1 overflow-x-auto py-1" style="scrollbar-width: none; min-height: 22px;">
                    <div class="flex gap-1 flex-1 overflow-x-auto" id="called-tags" style="scrollbar-width: none; flex-wrap: nowrap;"></div>
                </div>

                <!-- Separator -->
                <div class="section-separator"></div>

                <!-- Spectator mode message -->
                <div id="spectator-message" class="hidden flex-1 flex flex-col items-center justify-center text-center px-2 py-4">
                    <div class="text-3xl mb-2 float-anim">&#128064;</div>
                    <div class="text-bingo-orange font-bold text-sm mb-1">Spectating</div>
                    <div class="text-white/40 text-xs">Join next round to play!</div>
                </div>

                <!-- Cartela(s) -->
                <div id="cartela-area" class="flex-1 flex flex-col gap-1.5 min-h-0">
                    <div id="cartela-wrap-1" class="hidden rounded-xl overflow-hidden" style="border: 1px solid rgba(255,140,0,0.3);">
                        <div class="text-center py-1 text-[10px] font-black text-white tracking-wider" style="background: linear-gradient(135deg, #FF8C00, #FF6B00); text-shadow: 0 1px 2px rgba(0,0,0,0.3);">
                            CARTELA NO: <span id="cartela-number-1">0</span>
                        </div>
                        <div class="grid grid-cols-5 gap-px" id="cartela-grid-headers-1">
                            <div class="text-center text-[8px] font-black py-0.5 text-white" style="background: #3B82F6;">B</div>
                            <div class="text-center text-[8px] font-black py-0.5 text-white" style="background: #8B5CF6;">I</div>
                            <div class="text-center text-[8px] font-black py-0.5 text-white" style="background: #D946EF;">N</div>
                            <div class="text-center text-[8px] font-black py-0.5 text-white" style="background: #10B981;">G</div>
                            <div class="text-center text-[8px] font-black py-0.5 text-white" style="background: #F97316;">O</div>
                        </div>
                        <div class="grid grid-cols-5 gap-px" id="cartela-grid-1" style="background: rgba(26,26,46,0.5);"></div>
                    </div>

                    <div id="cartela-wrap-2" class="hidden rounded-xl overflow-hidden" style="border: 1px solid rgba(255,140,0,0.3);">
                        <div class="text-center py-1 text-[10px] font-black text-white tracking-wider" style="background: linear-gradient(135deg, #FF8C00, #FF6B00); text-shadow: 0 1px 2px rgba(0,0,0,0.3);">
                            CARTELA NO: <span id="cartela-number-2">0</span>
                        </div>
                        <div class="grid grid-cols-5 gap-px" id="cartela-grid-headers-2">
                            <div class="text-center text-[8px] font-black py-0.5 text-white" style="background: #3B82F6;">B</div>
                            <div class="text-center text-[8px] font-black py-0.5 text-white" style="background: #8B5CF6;">I</div>
                            <div class="text-center text-[8px] font-black py-0.5 text-white" style="background: #D946EF;">N</div>
                            <div class="text-center text-[8px] font-black py-0.5 text-white" style="background: #10B981;">G</div>
                            <div class="text-center text-[8px] font-black py-0.5 text-white" style="background: #F97316;">O</div>
                        </div>
                        <div class="grid grid-cols-5 gap-px" id="cartela-grid-2" style="background: rgba(26,26,46,0.5);"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Separator before bottom bar -->
        <div class="section-separator mx-2"></div>

        <!-- Bottom bar -->
        <div class="px-2 py-2 mt-auto">
            <div class="rounded-2xl px-3 py-2 flex items-center justify-between gap-2" style="background: rgba(26,26,46,0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08);">
                <button onclick="leaveGame(); navigateTo('home').catch(()=>{})" class="flex items-center gap-1.5 px-3 py-2 rounded-xl text-[11px] font-semibold transition-all active:scale-95" style="background: rgba(239,68,68,0.15); color: #EF4444; border: 1px solid rgba(239,68,68,0.25);">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    Leave
                </button>
                <div class="flex items-center gap-2">
                    <span class="text-[9px] text-white/40 uppercase tracking-wider font-medium">Auto</span>
                    <div id="auto-toggle" class="auto-toggle" onclick="toggleAutoMark()"></div>
                </div>
                <button onclick="toggleAutoMark()" class="flex items-center gap-1.5 px-3 py-2 rounded-xl text-[11px] font-bold transition-all active:scale-95" style="background: linear-gradient(135deg, rgba(255,140,0,0.2), rgba(255,107,0,0.2)); color: #FF8C00; border: 1px solid rgba(255,140,0,0.3);">
                    AUTO
                </button>
            </div>
        </div>
    </div>
