<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yegara Bingo</title>
    <script src="https://telegram.org/js/telegram-web-app.js?63"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        window.API_BASE = 'https://yegara-bingo-api.onrender.com';
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bingo-dark': '#0D1117',
                        'bingo-card': '#1A1A2E',
                        'bingo-orange': '#FF8C00',
                        'bingo-green': '#10B981',
                        'bingo-blue': '#3B82F6',
                        'bingo-purple': '#8B5CF6',
                        'bingo-teal': '#14B8A6',
                        'bingo-red': '#EF4444',
                        'bingo-pink': '#EC4899',
                        'bingo-yellow': '#EAB308',
                        'bingo-cyan': '#06B6D4',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/game.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body class="bg-bingo-dark">

    <!-- Telegram Mini App Header -->
    <div id="telegram-header" class="telegram-header fixed top-0 left-0 right-0 z-50 bg-bingo-dark/95 backdrop-blur-sm border-b border-white/10 h-14 flex items-center justify-between px-4 max-w-[420px] mx-auto">
        <!-- Content loaded by page-loader from components/header.html -->
    </div>

    <!-- App Container - Pages loaded here dynamically -->
    <div id="app-container">
        <div id="screen-home" class="screen active pt-14" style="background: linear-gradient(180deg, #0D1117 0%, #0a1628 40%, #111827 100%);">
            <!-- Content loaded by page-loader from pages/home.html -->
        </div>
        <div id="screen-game" class="screen pt-14" style="background: linear-gradient(180deg, #0D1117 0%, #0a0f18 50%, #111827 100%);">
            <!-- Content loaded by page-loader from pages/game-board.html -->
        </div>
        <div id="screen-history" class="screen pt-14">
            <!-- Content loaded by page-loader from pages/history.html -->
        </div>
        <div id="screen-wallet" class="screen pt-14">
            <!-- Content loaded by page-loader from pages/wallet.html -->
        </div>
        <div id="screen-profile" class="screen pt-14">
            <!-- Content loaded by page-loader from pages/profile.html -->
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div id="bottom-nav" class="fixed bottom-0 left-0 right-0 z-50 bg-bingo-dark/95 backdrop-blur-sm border-t border-white/10 max-w-[420px] mx-auto">
        <!-- Content loaded by page-loader from components/bottom-nav.html -->
    </div>

    <!-- Modals -->
    <div id="win-modal" class="fixed inset-0 z-[100] hidden">
        <!-- Content loaded by page-loader from components/win-modal.html -->
    </div>
    <div id="rules-modal" class="fixed inset-0 z-[100] hidden">
        <!-- Content loaded by page-loader from components/rules-modal.html -->
    </div>
    <div id="transfer-modal" class="fixed inset-0 z-[100] hidden">
        <!-- Content loaded by page-loader from components/transfer-modal.html -->
    </div>
    <div id="withdrawModal" class="fixed inset-0 z-[100] hidden">
        <!-- Content loaded by page-loader from components/withdraw-modal.html -->
    </div>
    <div id="registerModal" class="fixed inset-0 z-[200] hidden">
        <!-- Content loaded by page-loader from components/register-modal.html -->
    </div>
    <div id="card-select-screen" class="fixed inset-0 z-[150] hidden">
        <!-- Content loaded by page-loader from components/card-select.html -->
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 z-[200] hidden">
        <!-- Content loaded by page-loader from components/loading-overlay.html -->
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed top-20 left-1/2 -translate-x-1/2 z-[250] hidden">
        <!-- Content loaded by page-loader from components/toast.html -->
    </div>

    <!-- Scripts -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/constants.js"></script>
    <script src="js/state.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/helpers.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/card-select.js"></script>
    <script src="js/game-board.js"></script>
    <script src="js/history.js"></script>
    <script src="js/wallet.js"></script>
    <script src="js/rules.js"></script>
    <script src="js/page-loader.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
