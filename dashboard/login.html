<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yegara Bingo - Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK replaced by local SQL emulator bridge -->
    <script>
        window.API_BASE = 'https://yegara-bingo-api.onrender.com';
    </script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="js/firebase.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * { font-family: 'Inter', sans-serif; }

        body {
            background-color: #0D1117;
            min-height: 100vh;
        }

        .bg-mesh {
            background-image:
                radial-gradient(at 20% 30%, rgba(249, 115, 22, 0.08) 0px, transparent 50%),
                radial-gradient(at 80% 70%, rgba(251, 146, 60, 0.06) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(30, 41, 59, 0.5) 0px, transparent 70%);
        }

        .glass-card {
            background: rgba(26, 26, 46, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow:
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.03) inset;
        }

        .logo-circle {
            background: linear-gradient(135deg, #F97316, #EA580C, #DC2626);
            box-shadow:
                0 8px 32px rgba(249, 115, 22, 0.35),
                0 0 0 4px rgba(249, 115, 22, 0.1);
        }

        .btn-gradient {
            background: linear-gradient(135deg, #F97316, #EA580C);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
        }

        .btn-gradient:hover {
            background: linear-gradient(135deg, #FB923C, #F97316);
            box-shadow: 0 6px 25px rgba(249, 115, 22, 0.45);
            transform: translateY(-1px);
        }

        .btn-gradient:active {
            transform: translateY(0);
        }

        .input-field {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #F97316;
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15), 0 0 20px rgba(249, 115, 22, 0.08);
            background: rgba(15, 23, 42, 0.8);
        }

        .input-field::placeholder {
            color: rgba(148, 163, 184, 0.5);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.7; }
            100% { transform: scale(0.95); opacity: 1; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.7s ease-out forwards;
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        .animate-delay-1 { animation-delay: 0.1s; opacity: 0; }
        .animate-delay-2 { animation-delay: 0.2s; opacity: 0; }
        .animate-delay-3 { animation-delay: 0.3s; opacity: 0; }
        .animate-delay-4 { animation-delay: 0.4s; opacity: 0; }
        .animate-delay-5 { animation-delay: 0.5s; opacity: 0; }
        .animate-delay-6 { animation-delay: 0.6s; opacity: 0; }

        .spinner {
            animation: spin 0.8s linear infinite;
        }

        .error-shake {
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }

        .floating-dots {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .dot {
            position: absolute;
            border-radius: 50%;
            background: rgba(249, 115, 22, 0.06);
            animation: float 20s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            25% { transform: translateY(-30px) translateX(15px); }
            50% { transform: translateY(-15px) translateX(-10px); }
            75% { transform: translateY(-40px) translateX(20px); }
        }
    </style>
</head>
<body class="bg-mesh flex items-center justify-center min-h-screen p-4 relative overflow-hidden">

    <div class="floating-dots">
        <div class="dot" style="width: 300px; height: 300px; top: 10%; left: -5%; animation-delay: 0s;"></div>
        <div class="dot" style="width: 200px; height: 200px; top: 60%; right: -3%; animation-delay: -5s;"></div>
        <div class="dot" style="width: 150px; height: 150px; bottom: 5%; left: 30%; animation-delay: -10s;"></div>
        <div class="dot" style="width: 250px; height: 250px; top: 20%; right: 20%; animation-delay: -15s;"></div>
    </div>

    <div class="w-full max-w-md relative z-10">

        <div class="glass-card rounded-3xl p-10 animate-fade-in-up">

            <!-- Logo -->
            <div class="flex justify-center animate-fade-in-up animate-delay-1">
                <div class="logo-circle w-20 h-20 rounded-full flex items-center justify-center">
                    <span class="text-white text-3xl font-extrabold tracking-tight">B</span>
                </div>
            </div>

            <!-- Title -->
            <div class="text-center mt-6 animate-fade-in-up animate-delay-2">
                <h1 class="text-2xl font-bold text-white tracking-tight">Yegara Bingo</h1>
                <p class="text-slate-400 text-sm mt-1.5 font-medium">Admin Dashboard</p>
            </div>

            <!-- Form -->
            <form id="loginForm" class="mt-8 space-y-5" onsubmit="return false;">

                <!-- Username -->
                <div class="animate-fade-in-up animate-delay-3">
                    <label for="username" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Username</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <svg class="w-4.5 h-4.5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 18px; height: 18px;">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                        </div>
                        <input
                            type="text"
                            id="username"
                            placeholder="Enter your username"
                            autocomplete="username"
                            class="input-field w-full pl-11 pr-4 py-3.5 rounded-xl text-white text-sm outline-none"
                        />
                    </div>
                </div>

                <!-- Password -->
                <div class="animate-fade-in-up animate-delay-4">
                    <label for="password" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <svg class="text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 18px; height: 18px;">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                            </svg>
                        </div>
                        <input
                            type="password"
                            id="password"
                            placeholder="Enter your password"
                            autocomplete="current-password"
                            class="input-field w-full pl-11 pr-4 py-3.5 rounded-xl text-white text-sm outline-none"
                        />
                    </div>
                </div>

                <!-- Error Message -->
                <div id="errorMsg" class="hidden animate-fade-in">
                    <div class="flex items-center gap-2 bg-red-500/10 border border-red-500/20 rounded-xl px-4 py-3">
                        <svg class="w-4 h-4 text-red-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        <span id="errorText" class="text-red-400 text-sm font-medium"></span>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="animate-fade-in-up animate-delay-5">
                    <button
                        type="submit"
                        id="submitBtn"
                        class="btn-gradient w-full py-3.5 rounded-xl text-white font-semibold text-sm tracking-wide flex items-center justify-center gap-2"
                    >
                        <span id="btnText">Sign In</span>
                        <svg id="btnSpinner" class="hidden spinner" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/>
                        </svg>
                    </button>
                </div>
            </form>
        </div>

        <!-- Footer -->
        <div class="text-center mt-8 animate-fade-in-up animate-delay-6">
            <p class="text-slate-600 text-xs font-medium">@yegarabingobot</p>
        </div>
    </div>

    <script>
        // db is provided by firebase.js emulator bridge (window.db)
        // Seed default super admin if not exists
        db.collection('admins').where('username', '==', 'paradox').limit(1).get().then(function(snap) {
            if (snap.empty) {
                db.collection('admins').add({
                    displayName: 'Super Admin',
                    username: 'paradox',
                    password: '12345678',
                    role: 'super_admin',
                    isActive: true,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
        });

        const form = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');

        function showError(msg) {
            errorText.textContent = msg;
            errorMsg.classList.remove('hidden');
            errorMsg.classList.remove('error-shake');
            void errorMsg.offsetWidth;
            errorMsg.classList.add('error-shake');
        }

        function hideError() {
            errorMsg.classList.add('hidden');
        }

        function setLoading(loading) {
            if (loading) {
                submitBtn.disabled = true;
                btnText.textContent = 'Signing In...';
                btnSpinner.classList.remove('hidden');
                submitBtn.style.opacity = '0.7';
            } else {
                submitBtn.disabled = false;
                btnText.textContent = 'Sign In';
                btnSpinner.classList.add('hidden');
                submitBtn.style.opacity = '1';
            }
        }

        submitBtn.addEventListener('click', async function () {
            hideError();

            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                showError('Please enter both username and password.');
                return;
            }

            setLoading(true);

            const SUPER_ADMIN = { username: 'paradox', password: '12345678', role: 'super_admin' };

            try {
                if (username === SUPER_ADMIN.username && password === SUPER_ADMIN.password) {
                    localStorage.setItem('loggedIn', 'true');
                    localStorage.setItem('username', SUPER_ADMIN.username);
                    localStorage.setItem('role', SUPER_ADMIN.role);
                    window.location.href = 'index.html';
                    return;
                }

                const snapshot = await db.collection('admins')
                    .where('username', '==', username)
                    .limit(1)
                    .get();

                if (snapshot.empty) {
                    showError('Invalid username or password.');
                    setLoading(false);
                    return;
                }

                const doc = snapshot.docs[0];
                const adminData = doc.data();

                if (adminData.password !== password) {
                    showError('Invalid username or password.');
                    setLoading(false);
                    return;
                }

                localStorage.setItem('loggedIn', 'true');
                localStorage.setItem('username', adminData.username || username);
                localStorage.setItem('role', adminData.role || 'admin');

                window.location.href = 'index.html';

            } catch (err) {
                console.error('Login error:', err);
                showError('Connection error. Please try again.');
                setLoading(false);
            }
        });

        document.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                submitBtn.click();
            }
        });

        usernameInput.focus();
    </script>
</body>
</html>
